# Faydo Docker Compose Configuration
# Production setup with HTTPS on port 9000

services:
  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faydo-backend
    restart: unless-stopped
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=*
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - DATABASE_URL=sqlite:///db.sqlite3
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    networks:
      - faydo-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: faydo-frontend
    restart: unless-stopped
    networks:
      - faydo-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy with HTTPS
  nginx:
    image: nginx:alpine
    container_name: faydo-nginx
    restart: unless-stopped
    ports:
      - "8001:443"
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    networks:
      - faydo-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  faydo-network:
    driver: bridge

volumes:
  backend_static:
  backend_media:
